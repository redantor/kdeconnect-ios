
name: Build KDE Connect iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout background-location branch
        uses: actions/checkout@v4
        with:
          ref: work/turx/background-location
          fetch-depth: 0

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: List project files
        run: |
          find . -maxdepth 3 \
            \( -name "*.xcodeproj" -o -name "*.xcworkspace" -o -name "Package.swift" \) \
            -print

      - name: Build application
        run: |
          set -e

          PROJECT=$(find . -maxdepth 3 -name "*.xcodeproj" | head -n 1)

          if [ -z "$PROJECT" ]; then
            echo "No Xcode project found"
            exit 1
          fi

          echo "Using project: $PROJECT"

          xcodebuild \
            -project "$PROJECT" \
            -scheme "KDE Connect" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Create unsigned IPA
        run: |
          set -e

          APP_PATH=$(find build/Build/Products -name "*.app" -type d | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            find build -type f | head -100
            exit 1
          fi

          echo "Found app: $APP_PATH"

          mkdir -p Payload

          cp -R "$APP_PATH" Payload/

          mkdir -p artifacts

          zip -r artifacts/KDEConnect-background-location-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: KDEConnect-background-location-unsigned-ipa
          path: artifacts/*.ipa
          if-no-files-found: error
          retention-days: 14

