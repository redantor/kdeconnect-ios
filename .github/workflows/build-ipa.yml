name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 使用指定 node24 兼容标记的官方步骤
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive # 确保子模块（如果有）被完整拉取

      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode.app

      # 检查项目目录结构（会在日志里打印，方便定位是 .xcodeproj 还是 .xcworkspace）
      - name: Inspect Project Directory
        run: |
          ls -la

      # 尝试自动定位 Workspace 或 Project 并进行构建
      - name: Build Archive
        run: |
          # 1. 优先检查是否存在 .xcworkspace
          if [ -d "*.xcworkspace" ] || [ -d "kdeconnect-ios.xcworkspace" ]; then
            WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
            echo "Found Workspace: $WORKSPACE"
            
            # 获取 Workspace 下的第一个 Scheme
            SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | awk '/Schemes:/{flag=1;next}/^$/{flag=0}flag' | xargs | awk '{print $1}')
            echo "Detected Scheme: $SCHEME"
            
            xcodebuild archive \
              -workspace "$WORKSPACE" \
              -scheme "${SCHEME:-kdeconnect-ios}" \
              -destination "generic/platform=iOS" \
              -archivePath ./build/kdeconnect.xcarchive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO
          else
            # 2. 如果只有 .xcodeproj
            PROJECT=$(ls -d *.xcodeproj | head -n 1)
            echo "Found Project: $PROJECT"
            
            # 强制列出所有可用 Schemes 打印在日志中
            xcodebuild -list -project "$PROJECT"
            
            # 自动抓取非空 Scheme，抓不到则回退到项目名
            SCHEME=$(xcodebuild -list -project "$PROJECT" | awk '/Schemes:/{flag=1;next}/^$/{flag=0}flag' | tr -d ' ' | grep -v '^$' | head -n 1)
            echo "Detected Scheme: $SCHEME"
            
            xcodebuild archive \
              -project "$PROJECT" \
              -scheme "${SCHEME:-kdeconnect-ios}" \
              -destination "generic/platform=iOS" \
              -archivePath ./build/kdeconnect.xcarchive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO
          fi

      # 打包成未签名的 .ipa
      - name: Create IPA Package
        run: |
          mkdir -p Payload
          cp -r ./build/kdeconnect.xcarchive/Products/Applications/*.app Payload/
          zip -r kdeconnect-unsigned.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kdeconnect-unsigned-ipa
          path: kdeconnect-unsigned.ipa
